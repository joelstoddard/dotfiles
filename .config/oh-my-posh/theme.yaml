# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

upgrade:
    source: cdn
    interval: 168h
    auto: true
    notice: false
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        foreground: "#90A959"
        template: "{{ if .SSHSession }}● {{ end }}"
      - type: python
        style: plain
        foreground: "#8a8a8a"
        foreground_templates:
          - "{{ if .Venv }}#FFDE57{{ end }}"
        template: " "
        properties:
          display_mode: environment
          home_enabled: true
      - type: path
        style: plain
        foreground: "#8a8a8a"
        foreground_templates:
          - "{{ if and (.Env.VIRTUAL_ENV) (eq (.Env.VIRTUAL_ENV | dir) .Location) }}#FFDE57{{ end }}"
        properties:
          style: folder
      - type: git
        style: plain
        foreground: "#F79625"
        template: "{{ .HEAD }}
          {{ if .Working.Untracked }}{{ .Working.Untracked }} {{ end
          }}{{ if .Working.Modified }}{{ .Working.Modified }} {{ end
          }}{{ if .Working.Deleted }}{{ .Working.Deleted }} {{ end
          }}{{ if gt .StashCount 0 }}{{ .StashCount }} {{ end
          }}{{ if gt .Ahead 0 }}{{ .Ahead }} {{ end
          }}{{ if gt .Behind 0 }}{{ .Behind }} {{ end
          }}"
        properties:
          fetch_status: true
          source: cli
          branch_icon: " "
      - type: root
        style: plain
        foreground: "#AC4242"
        template: "❯"
  - type: rprompt
    segments:
      - type: executiontime
        style: plain
        foreground: "#8a8a8a"
        template: "{{ .FormattedMs }}"
        properties:
          threshold: 5000
          style: round
secondary_prompt:
  background: transparent
  foreground: "#8a8a8a"
  template: "❯"
tooltips_action: prepend
tooltips:
  - type: kubectl
    style: plain
    tips:
      - kubectl
      - terraform
    foreground: "#326CE5"
    template: "󱃾 {{.Context}}{{if .Namespace}} - {{.Namespace}}{{end}} "
  - type: terraform
    tips:
      - terraform
    style: plain
    foreground: "#EBCC34"
    template: "{{ .Version }}"
  - type: aws
    tips:
      - aws
      - terraform
    style: plain
    foreground: "#FFA400"
    template: " 󰸏 {{.Profile}}{{if .Region }} {{ if or (hasPrefix \"us-\" .Region) (hasPrefix \"ca-\" .Region) (hasPrefix \"sa-\" .Region) }}{{ else if hasPrefix \"eu-\" .Region }}{{ else if or (hasPrefix \"ap-\" .Region) (hasPrefix \"cn-\" .Region) }}{{ else if or (hasPrefix \"af-\" .Region) (hasPrefix \"me-\" .Region) (hasPrefix \"il-\" .Region) }}{{ else }}󰇧{{ end }} {{ .Region }}{{end}}"
  - type: docker
    tips:
      - docker
    style: plain
    foreground: "#0B59E7"
    template: "  {{ .Context }} "
version: 3
