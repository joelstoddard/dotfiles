# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

upgrade:
    source: cdn
    interval: 168h
    auto: true
    notice: false
blocks:
  - type: prompt
    alignment: left
    segments:
      - type: session
        style: plain
        foreground: "#90A959"
        template: "{{ if .SSHSession }}ÔùÅ {{ end }}"
      - type: python
        style: plain
        foreground: "#8a8a8a"
        foreground_templates:
          - "{{ if .Venv }}#FFDE57{{ end }}"
        template: " ¯êÁ"
        properties:
          display_mode: environment
          home_enabled: true
      - type: path
        style: plain
        foreground: "#8a8a8a"
        foreground_templates:
          - "{{ if and (.Env.VIRTUAL_ENV) (eq (.Env.VIRTUAL_ENV | dir) .Location) }}#FFDE57{{ end }}"
        properties:
          style: folder
      - type: git
        style: plain
        foreground: "#F79625"
        template: "{{ .HEAD }}
          {{ if .Working.Untracked }}¯®┐{{ .Working.Untracked }} {{ end
          }}{{ if .Working.Modified }}¯¡â{{ .Working.Modified }} {{ end
          }}{{ if .Working.Deleted }}¯¬ü{{ .Working.Deleted }} {{ end
          }}{{ if gt .StashCount 0 }}´âç{{ .StashCount }} {{ end
          }}{{ if gt .Ahead 0 }}¯¬í{{ .Ahead }} {{ end
          }}{{ if gt .Behind 0 }}¯¬Ü{{ .Behind }} {{ end
          }}"
        properties:
          fetch_status: true
          source: cli
          branch_icon: "¯éá "
      - type: root
        style: plain
        foreground: "#AC4242"
        template: "ÔØ»"
  - type: rprompt
    segments:
      - type: executiontime
        style: plain
        foreground: "#8a8a8a"
        template: "{{ .FormattedMs }}"
        properties:
          threshold: 5000
          style: round
secondary_prompt:
  background: transparent
  foreground: "#8a8a8a"
  template: "ÔØ»"
tooltips_action: prepend
tooltips:
  - type: kubectl
    style: plain
    tips:
      - kubectl
      - terraform
    foreground: "#326CE5"
    template: "¾▒â¥ {{.Context}}{{if .Namespace}} - {{.Namespace}}{{end}} "
  - type: terraform
    tips:
      - terraform
    style: plain
    foreground: "#EBCC34"
    template: "{{ .Version }}"
  - type: aws
    tips:
      - aws
      - terraform
    style: plain
    foreground: "#FFA400"
    template: " ¾░©Å {{.Profile}}{{if .Region }}
          {{ if or (hasPrefix \"us-\" .Region) (hasPrefix \"ca-\" .Region) (hasPrefix \"sa-\" .Region) }}¯╣å{{ else if hasPrefix \"eu-\" .Region
          }}¯¢ï{{ else if or (hasPrefix \"ap-\" .Region) (hasPrefix \"cn-\" .Region)
          }}¯╣ç{{ else if or (hasPrefix \"af-\" .Region) (hasPrefix \"me-\" .Region) (hasPrefix \"il-\" .Region)
          }}¯╣à{{ else }}¾░çº{{ end }} {{ .Region }}{{end}}"
  - type: docker
    tips:
      - docker
    style: plain
    foreground: "#0B59E7"
    template: " ´îê {{ .Context }} "
version: 3
