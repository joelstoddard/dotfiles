  ibm-plex-mono:
    check: "fc-list | grep -qi 'BlexMono Nerd Font' || test -d /Users/*/Library/Fonts/BlexMono*"
    arch:
      type: yay
      name: ttf-ibmplex-mono-nerd
    debian:
      type: github-release
      repo: ryanoasis/nerd-fonts
      asset: "IBMPlexMono.tar.xz"
      install: "mkdir -p $HOME/.local/share/fonts && tar -xJf {asset} -C $HOME/.local/share/fonts && fc-cache -fv"
    ubuntu:
      type: github-release
      repo: ryanoasis/nerd-fonts
      asset: "IBMPlexMono.tar.xz"
      install: "mkdir -p $HOME/.local/share/fonts && tar -xJf {asset} -C $HOME/.local/share/fonts && fc-cache -fv"
    macos:
      type: cask
      name: font-blex-mono-nerd-font

  atkinson-hyperlegible:
    check: "fc-list | grep -qi 'Atkinson Hyperlegible' || test -d /Users/*/Library/Fonts/Atkinson*"
    arch:
      type: yay
      name: ttf-atkinson-hyperlegible-nerd
    debian:
      type: github-release
      repo: ryanoasis/nerd-fonts
      asset: "AtkinsonHyperlegible.tar.xz"
      install: "mkdir -p $HOME/.local/share/fonts && tar -xJf {asset} -C $HOME/.local/share/fonts && fc-cache -fv"
    ubuntu:
      type: github-release
      repo: ryanoasis/nerd-fonts
      asset: "AtkinsonHyperlegible.tar.xz"
      install: "mkdir -p $HOME/.local/share/fonts && tar -xJf {asset} -C $HOME/.local/share/fonts && fc-cache -fv"
