desktop:
  firefox:
    arch: ~
    debian:
      type: apt-repo
      name: firefox
      setup: |
        sudo install -d -m 0755 /etc/apt/keyrings
        wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
        echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list
        sudo apt update
    ubuntu:
      type: apt-repo
      name: firefox
      setup: |
        sudo install -d -m 0755 /etc/apt/keyrings
        wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | sudo tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
        echo "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main" | sudo tee /etc/apt/sources.list.d/mozilla.list
        sudo apt update
    macos:
      type: cask

  bitwarden:
    check: "test -d /Applications/Bitwarden.app || dpkg -l bitwarden 2>/dev/null | grep -q ^ii"
    arch: ~
    debian:
      type: github-release
      repo: bitwarden/clients
      asset: "Bitwarden-*-amd64.deb"
    ubuntu:
      type: github-release
      repo: bitwarden/clients
