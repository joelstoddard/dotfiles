      type: github-release
      repo: lance0/ttl
      asset: "ttl-x86_64-unknown-linux-musl.tar.gz"
      install: "mkdir -p $HOME/.local/bin /tmp/ttl-unpack && tar -xzf {asset} -C /tmp/ttl-unpack && install -m 755 $(find /tmp/ttl-unpack -name ttl -type f | head -1) $HOME/.local/bin/ttl && rm -rf /tmp/ttl-unpack"
